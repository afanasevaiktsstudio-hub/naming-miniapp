<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B0620" />
    <title>Аналитикада · Нейминг</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      .boot-fallback {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        gap: 12px;
        background: #1B0620;
        color: #F4E7D3;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        text-align: center;
      }
      .boot-fallback.is-visible { display: flex; }
      .boot-fallback h1 { font-size: 18px; margin: 0; font-weight: 700; color: #D1A66B; }
      .boot-fallback p { font-size: 14px; margin: 0; line-height: 1.5; opacity: 0.85; max-width: 320px; }
      .boot-fallback button {
        margin-top: 8px;
        padding: 10px 20px;
        border-radius: 999px;
        border: 1px solid #D1A66B;
        background: transparent;
        color: #D1A66B;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-fallback" class="boot-fallback" role="alert">
      <h1>Мини-апп не загрузился</h1>
      <p>
        Похоже, Telegram использует устаревший кэш. Закрой это окно,
        в Telegram зайди в «Настройки → Данные → Очистить кэш» и открой снова.
      </p>
      <button type="button" onclick="location.reload()">Перезагрузить</button>
    </div>
    <script>
      (function () {
        var shown = false;
        function showFallback() {
          if (shown) return;
          var root = document.getElementById("root");
          if (root && root.childElementCount > 0) return;
          shown = true;
          var el = document.getElementById("boot-fallback");
          if (el) el.classList.add("is-visible");
        }
        window.addEventListener("error", function (e) {
          if (e && e.target && (e.target.tagName === "SCRIPT" || e.target.tagName === "LINK")) {
            showFallback();
          }
        }, true);
        setTimeout(showFallback, 7000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
